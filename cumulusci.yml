# =============================================================================
# DEMO BRIX CONFIG
# =============================================================================
# Main configuration for this Brix. Name and package.name must match.
# Guidance: https://qlabs-org.my.site.com/qverse/s/learn?name=Template-Overview

project:
  name: xDO-Template

  package:
    name: xDO-Template
    # Metadata API Version — keep in sync with sfdx-project.json
    api_version: "66.0"

  git:
    repo_url: https://github.com/sfdc-qbranch-emu/xDO-Template

  # ---------------------------------------------------------------------------
  # Brix registration
  # ---------------------------------------------------------------------------
  # Run "UTILS: Setup New Brix Project" (Cmd+Shift+B on macOS) to populate.
  # Safe to re-run; must be completed before checking in changes to GitHub.
  custom:
    qbrix_owner_name: OWNER NAME HERE
    qbrix_owner_email: OWNER EMAIL HERE
    qbrix_owner_team: OWNER TEAM HERE
    qbrix_publisher_name: OWNER OR PUBLISHER NAME HERE
    qbrix_publisher_team: OWNER OR PUBLISHER TEAM HERE
    qbrix_documentation_url: https://qlabs-org.my.site.com/qverse/s/
    qbrix_description: SHORT DESCRIPTION OF BRIX HERE

  # ---------------------------------------------------------------------------
  # Salesforce package dependencies
  # ---------------------------------------------------------------------------
  # Managed and unmanaged Salesforce packages.
  # Guidance: https://qlabs-org.my.site.com/qverse/s/learn?name=Template-Dependencies-and-Packages
  dependencies:

    # =============================================================================
    # SOURCES
    # =============================================================================
    # Dependent Brix used by this Brix.
    # Guidance: https://qlabs-org.my.site.com/qverse/s/learn?name=Template-Dependencies-and-Packages

sources:
  # Brix Registration base
  qbrix_register_base:
    github: https://github.com/sfdc-qbranch-emu/QBrix-1-xDO-Tool-QBrixRegister

# =============================================================================
# TASKS
# =============================================================================

tasks:
  # NextGen Data Tool integration — add data keys here or inline within a flow step
  deploy_nextgen_data:
    class_path: qx.data.qx_nextgen_datatool.RunDataTool
  # Add custom task definitions and overrides below.


  # =============================================================================
  # FLOWS — Deployment lifecycle
  # =============================================================================
  # deploy_qbrix (defined elsewhere) runs these stages in order, with tracing:
  #   1. prepare_org          (pre-deploy)
  #   2. source_dependencies  (pre-deploy)
  #   3. deploy               (force-app/main/default — defined elsewhere)
  #   4. post_qbrix_deploy    (post-deploy)
  #
  # Override deploy_qbrix here only if you must (not recommended).

flows:

  # ---------------------------------------------------------------------------
  # Stage 1 — Pre-deploy
  # ---------------------------------------------------------------------------

  prepare_org:
    steps:
      1:
        # Brix system task — leave in place
        task: orgconfig_hydrate
      2:
        # Pre-deploy settings in force-app/main/default (if any)
        task: deploy_settings
      3:
        # Deploy packages declared in project.dependencies
        task: update_dependencies

  source_dependencies:
    steps:
      1:
        # Brix system task — leave in place
        task: orgconfig_hydrate
      2:
        # Install Brix Registration requirements in the target org
        flow: qbrix_register_base:deploy_qbrix
        when: not org_config.is_qbrix_installed('QBrix-1-xDO-Tool-QBrixRegister')

  # ---------------------------------------------------------------------------
  # Stage 3 — Post-deploy
  # ---------------------------------------------------------------------------
  # Replace the placeholder step with real post-deploy work as needed.

  post_qbrix_deploy:
    steps:
      1:
        task: None

  # ===========================================================================
  # Auxiliary flows
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Test validation
  # ---------------------------------------------------------------------------
  # Validate org deployment through testing.
  # Guide: https://confluence.internal.salesforce.com/display/QNEXTGENDEMOS/Validation+Methods

  validate_qbrix:
    steps:
      1:
        task: validate_qbrix

  # ---------------------------------------------------------------------------
  # Data
  # ---------------------------------------------------------------------------
  # Deploy data as needed. Placeholder wired to the NextGen Data Tool.
  # Guide: https://confluence.internal.salesforce.com/display/QNEXTGENDEMOS/Data

  deploy_qbrix_data:
    steps:
      1:
        # Placeholder — replace with your custom steps
        task: deploy_nextgen_data
