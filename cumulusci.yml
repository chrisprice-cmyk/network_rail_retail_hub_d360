project:
  #------------------------------------#
  # QBRIX CONFIG                       #
  #------------------------------------#
  #QBRIX NAME, API VERSION AND REPO DETAILS GO HERE

  name: xDO-Template
  package:
    name: xDO-Template
    api_version: "56.0"
  git:
    default_branch: "main"
    repo_url: https://github.com/sfdc-qbranch/xDO-Template
  source_format: sfdx

  #------------------------------------#
  # QBRIX CUSTOM OPTIONS & SETTINGS    #
  #------------------------------------#

  custom:
    # ADD YOUR DETAILS HERE FOR Q BRIX REGISTRATION
    # It is recommended you run cci task run setup_qbrix to set these as it will also update other files
    qbrix_owner_name: "OWNER NAME HERE"
    qbrix_owner_team: "OWNER TEAM HERE"
    qbrix_publisher_name: "OWNER OR PUBLISHER NAME HERE"
    qbrix_publisher_team: "OWNER OR PUBLISHER TEAM HERE"
    qbrix_documentation_url: https://confluence.internal.salesforce.com/pages/viewpage.action?pageId=487362018
    qbrix_description: "SHORT DESCRIPTION OF QBRIX HERE"

    #GLOBAL EXCLUSION LIST
    #Used by retrieve_changes and list_changes builtin CCI tasks
    exclude: &exclude-list
      - FeatureParameter
      - "AuraDefinition:"
      - "SiteDotCom:"
      - "ManagedTopics:"
      - "LiveChatTranscript:"
      - "ExperienceResource:"
      - "AppMenu:"
      - "Profile:"
      - "FlowDefinition:"

  #------------------------------------#
  # QBRIX PACKAGE DEPENDENCIES         #
  #------------------------------------#
  #ADD MANAGED & UNMANAGED PACKAGE DEPENDENCIES HERE. OTHER CCI PROJECTS CAN ALSO BE LINKED PROVIDING THEY WORK WITH JUST A DEPLOY METHOD.

  dependencies:
  #--Examples:
  #   - github: GitHubRepoURLHere (Note: This MUST be a CumulusCI Project and doesn't support custom installs, use sources if thats needed)
  #   - version_id: UnmanagedPackageIDHere
  #   - namespace: ManagedPackageNamespaceHere (Note: Lightning Components need to use the package ID and are treated as an unmanaged package)
  #     version: ManagedPackageVersionNumberHere
  #--Add Project Level Dependencies Below

#--Add Project Sources here--
sources:
  #------------------------------------#
  # QBRIX SOURCES                      #
  #------------------------------------#
  # Add Q Brix Sources here. These must be located on GitHub and be a CCI Project or Q Brix Project.

  base:
    github: https://github.com/sfdc-qbranch/QBrix-0-xDO-BaseConfig

tasks:
  #------------------------------------#
  # CCI TASK DEFAULTS                  #
  #------------------------------------#
  # Default configuration and overrides for builtin CCI Tasks

  run_tests:
    options:
      required_org_code_coverage_percent: 75

  load_dataset:
    options:
      ignore_row_errors: True
      drop_missing_schema: True
      set_recently_viewed: True

  generate_dataset_mapping:
    options:
      ignore:
        - "LiveChatTranscript"

  deploy:
    options:
      path: force-app

  org_settings:
    options:
      definition_file: orgs/dev.json

  update_admin_profile:
    options:
      package_xml: files/package.xml
      api_names:
        - Admin

  list_changes:
    options:
      exclude: *exclude-list

  retrieve_changes:
    options:
      exclude: *exclude-list

  #------------------------------------#
  # Q BRIX TASKS                       #
  #------------------------------------#
  # CUSTOM TASKS ADDED FOR Q BRIX DEVELOPMENT

  health_check:
    class_path: tasks.custom.qbrix_utils.HealthChecker

  update_qbrix:
    class_path: tasks.custom.qbrix_utils.QBrixUpdater

  setup_qbrix:
    class_path: tasks.custom.qbrix_utils.Initialise_Project

  list_qbrix:
    class_path: tasks.custom.qbrix_sf.ListQBrix

  mass_qbrix_update:
    class_path: tasks.custom.qbrix_utils.MassFileOps

  deploy_settings:
    description: Checks that Settings have been defined in force-app and deploys them if present
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: force-app/main/default/settings

  install_qbrix_register:
    description: Installs the Q Brix Registration Tool
    class_path: cumulusci.tasks.salesforce.UpdateDependencies
    options:
      dependencies:
        - github: https://github.com/sfdc-qbranch/QBrix-1-xDO-Tool-QBrixRegister
          unmanaged: True

  #------------------------------------#
  # DATA TOOL INTEGRATION              #
  #------------------------------------#
  # Note: This section can be removed if you are not using the NextGen Data Tool

  # Do not modify this task
  data_tool_status:
    description: Waits for the Data Tool status to be complete within the target org before allowing flow to continue.
    class_path: cumulusci.tasks.salesforce.custom_settings_wait.CustomSettingValueWait
    options:
      object: NXDO__Data_Tool_Status__c
      field: NXDO__Completed__c
      value: True

  # Update the value for param1 to your data key
  data_tool_deploy:
    description: Executes the command to run the NxDO Data Tool
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      apex: NXDO.DataTool_Utilities.requestDeploy('%%%PARAM_1%%%', true);
      param1: 1234

  # Update the value for param1 to your data key
  data_tool_deploy_test:
    description: Executes the command to run the NxDO Data Tool from a Scratch org Sandbox Org
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      apex: NXDO.DataTool_Utilities.requestDeploy('%%%PARAM_1%%%', false);
      param1: 1234

  #------------------------------------#
  # TESTIM INTEGRATION                 #
  #------------------------------------#
  # Replace the testimname parameter value with the name of the script you want to run.
  # Note: This section can be removed if you are not using Testim.
  qbrix_task_Testim:
    description: "Run Testim Script"
    class_path: tasks.custom.testim.RunTestim
    options:
      testimname: "REPLACE WITH NAME OF SCRIPT"
      pass_env: true

  #------------------------------------#
  # CUSTOM TASKS                       #
  #------------------------------------#
  # Add Your Custom Tasks here

flows:
  #------------------------------------#
  # STAGE 1 of 3: PRE-QBRIX DEPLOYMENT #
  #------------------------------------#

  # Prepares the Org with any required settings/testim scripts
  prepare_org:
    steps:
      1:
        task: install_qbrix_register
        ui_options:
          name: Install/Update QBrix Registration Tool
      2:
        task: deploy_settings
        ui_options:
          name: Deploy Required Settings to Salesforce Org
      3:
        # Dependencies are set in the QBRIX PACKAGE DEPENDENCIES area above.
        task: update_dependencies
        ui_options:
          name: Installs/Updates Q Brix Dependencies

  # Add steps here to deploy q brix added to the sources area above
  source_dependencies:
    steps:
      1:
        # Placeholder task, replace this with your custom steps
        task: None

  #------------------------------------#
  # STAGE 2 of 3: Q BRIX DEPLOYMENT    #
  #------------------------------------#
  #DEFAULT INSTALL FLOWS ARE DEFINED HERE. "deploy_qbrix" and "deploy_qbrix_min" SHOULD ALWAYS BE DEFINED

  # Deploys the q brix
  deploy_qbrix:
    steps:
      1:
        flow: dependencies
      2:
        task: deploy
        ui_options:
          name: Deploying Q Brix Metadata
      3:
        flow: post_qbrix_deploy

  # Deploys just the contents of this q brix with any essential dependencies
  deploy_qbrix_min:
    steps:
      1:
        flow: deploy_qbrix

  # Deploys the q brix into a TSO or Production Org
  deploy_qbrix_tso:
    steps:
      1:
        flow: deploy_qbrix

  #-------------------------------------------------#
  # STAGE 3 of 3 (OPTIONAL) POST-QBRIX DEPLOYMENT   #
  #-------------------------------------------------#
  # ADD POST DEPLOYMENT STEPS HERE

  post_qbrix_deploy:
    steps:
      1:
        # Placeholder task, replace this with your custom steps
        flow: deploy_qbrix_data

  #------------------------------------#
  # QBRIX TEST VALIDATION              #
  #------------------------------------#
  # Add steps here to validate your org deployment through testing (for example with Testim or Q Robot)

  validate_qbrix:
    steps:
      1:
        task: None

  #------------------------------------#
  # QBRIX DATA                         #
  #------------------------------------#
  #DEFINE DATA GENERATION FLOWS AND TASKS HERE

  deploy_qbrix_data:
    steps:
      1:
        # Placeholder task, replace this with your custom steps
        task: None

  #------------------------------------#
  # QBRIX LEGACY FLOWS AND DEFAULTS    #
  #------------------------------------#
  #
  # NOTE: These flows should not need to be modified and allow for legacy integration and default overrides.
  #

  # Legacy flow to redirect to the new flow for deploying data.
  generate_qbrix_data:
    steps:
      1:
        flow: deploy_qbrix_data

  # Default Override of cci task
  deploy_unmanaged_ee:
    steps:
      6:
        task: None

  # Default Override of cci task
  deploy_unmanaged:
    steps:
      4:
        task: None

  dependencies:
    steps:
      1:
        flow: prepare_org
      2:
        flow: source_dependencies

  config_dev:
    steps:
      3:
        flow: post_qbrix_deploy

  config_qa:
    steps:
      3:
        flow: post_qbrix_deploy

orgs:
  #------------------------------------#
  # SCRATCH ORG CONFIG                 #
  #------------------------------------#
  #DEFAULT SETTINGS FOR SCRATCH ORGS. PREVIEW ORGS ARE DESIGNED TO LOAD ON NA135 WHICH IS AN R0 INSTANCE

  scratch:
    dev:
      config_file: orgs/dev.json
      days: 30
      namespaced: false
    dev_preview:
      config_file: orgs/dev_preview.json
      days: 30
      namespaced: false
    qa:
      config_file: orgs/dev.json
      days: 30
      namespaced: false
    qa_preview:
      config_file: orgs/dev_preview.json
      days: 30
      namespaced: false

plans:
  #------------------------------------#
  # METADEPLOY CONFIG                  #
  #------------------------------------#
  # DEFINE DEPLOY PLANS HERE FOR USE WITH METADEPLOY

  deploy_q_brix_plan:
    slug: deployqbrix
    title: Deploy Q Brix
    tier: primary
    is_listed: True
    steps:
      1:
        flow: deploy_qbrix_tso
