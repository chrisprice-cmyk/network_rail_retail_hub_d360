project:
  #------------------------------------#
  # QBRIX CONFIG                       #
  #------------------------------------#
  #QBRIX NAME, API VERSION AND REPO DETAILS GO HERE

  name: xDO-Template
  package:
    name: xDO-Template
    api_version: "56.0"
  git:
    default_branch: "main"
    repo_url: https://github.com/sfdc-qbranch/xDO-Template
  source_format: sfdx

  #------------------------------------#
  # QBRIX PACKAGE DEPENDENCIES       #
  #------------------------------------#
  #ADD MANAGED & UNMANAGED PACKAGE DEPENDENCIES HERE. OTHER CCI PROJECTS CAN ALSO BE LINKED PROVIDING THEY WORK WITH JUST A DEPLOY METHOD.

  #dependencies:
  #--Examples:
  #   - github: GitHubRepoURLHere (Note: This MUST be a CumulusCI Project and doesn't support custom installs, use sources if thats needed)
  #   - version_id: UnmanagedPackageIDHere
  #   - namespace: ManagedPackageNamespaceHere (Note: Lightning Components need to use the package ID and are treated as an unmanaged package)
  #     version: ManagedPackageVersionNumberHere
  #--Add Project Level Dependencies Below

  #------------------------------------#
  # QBRIX CUSTOM OPTIONS & SETTINGS    #
  #------------------------------------#

  custom:
    #Exclude list to be used with list_changes and retrieve_changes tasks
    exclude: &exclude-list
      - FeatureParameter
      - "AuraDefinition:"
      - "SiteDotCom:"
      - "ManagedTopics:"
      - "LiveChatTranscript:"
      - "ExperienceResource:"
      - "AppMenu:"
      - "Profile:"
      - "FlowDefinition:"

#--Add Project Sources here--
sources:
  #------------------------------------#
  # QBRIX SOURCES                      #
  #------------------------------------#
  #ADD SOURCES HERE WHICH MUST BE CCI PROJECTS STORED IN GITHUB.

  base:
    github: https://github.com/sfdc-qbranch/QBrix-0-xDO-BaseConfig

tasks:
  #------------------------------------#
  # CCI TASK DEFAULTS                  #
  #------------------------------------#
  #ADD DEFAULT CONFIGURATION FOR CCI TASK HERE

  run_tests:
    options:
      required_org_code_coverage_percent: 75

  load_dataset:
    options:
      ignore_row_errors: True
      drop_missing_schema: True
      set_recently_viewed: True

  generate_dataset_mapping:
    options:
      ignore:
        - "LiveChatTranscript"

  deploy:
    options:
      path: force-app

  org_settings:
    options:
      definition_file: orgs/dev.json

  update_admin_profile:
    options:
      package_xml: files/package.xml
      api_names:
        - Admin

  robot:
    options:
      suites: robot/Qbrix/tests
      options:
        outputdir: robot/Qbrix/results

  robot_testdoc:
    options:
      path: robot/Qbrix/tests
      output: robot/Qbrix/doc/qbrix_tests.html

  health_check:
    class_path: tasks.custom.qbrix_utils.HealthChecker

  #------------------------------------#
  # QBRIX TASKS                        #
  #------------------------------------#

  update_vscode_tasks:
    description: Update .vscode tasks.json file from Qbrix template
    class_path: cumulusci.tasks.command.Command
    options:
      command: chmod +x scripts/QBrix/*.sh && scripts/Qbrix/UpdateVSCodeTasks.sh

  deploy_settings:
    description: Checks that Settings have been defined in force-app and deploys them if present
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: force-app/main/default/settings

  install_qbrix_register:
    description: Installs the Q Brix Registration Tool
    class_path: cumulusci.tasks.salesforce.UpdateDependencies
    options:
      dependencies:
        - github: https://github.com/sfdc-qbranch/QBrix-1-xDO-Tool-QBrixRegister
          unmanaged: True

  data_tool_status:
    description: Waits for the Data Tool status to be complete within the target org before allowing flow to continue.
    class_path: cumulusci.tasks.salesforce.custom_settings_wait.CustomSettingValueWait
    options:
      object: NXDO__Data_Tool_Status__c
      field: NXDO__Completed__c
      value: True

  data_tool_deploy:
    description: Executes the command to run the NxDO Data Tool
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      apex: NXDO.DataTool_Utilities.requestDeploy('%%%PARAM_1%%%', true);

  data_tool_deploy_test:
    description: Executes the command to run the NxDO Data Tool from a Scratch org Sandbox Org
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      apex: NXDO.DataTool_Utilities.requestDeploy('%%%PARAM_1%%%', false);

  #------------------------------------#
  # CHANGE CAPTURE                     #
  #------------------------------------#
  #ADD OBJECT EXCLUSIONS HERE WHICH YOU DON'T WANT TO PULL TO SOURCE BY DEFAULT

  list_changes:
    options:
      exclude: *exclude-list

  retrieve_changes:
    options:
      exclude: *exclude-list

  #------------------------------------#
  # TESTIM INTEGRATION                 #
  #------------------------------------#
  #Replace the testimname with the name of the script you want to run. This section can be removed if you are not using Testim.
  qbrix_task_Testim:
    description: "Run Testim Script"
    class_path: tasks.custom.testim.RunTestim
    options:
      testimname: "REPLACE WITH NAME OF SCRIPT"
      pass_env: true

flows:
  #------------------------------------#
  # CCI FLOW DEFAULTS                  #
  #------------------------------------#

  deploy_unmanaged_ee:
    steps:
      6:
        task: None

  deploy_unmanaged:
    steps:
      4:
        task: None

  #------------------------------------#
  # PRE-QBRIX DEPLOY                   #
  #------------------------------------#
  #APPEND ADDITIONAL SOURCE DEPENDENCY DEPLOYMENTS ONTO THE DEFAULT CCI DEPENDENCY FLOW

  source_dependencies:
    steps:
      1:
        task: None
        # flow: base:deploy_qbrix

  dependencies:
    steps:
      1:
        flow: prepare_org
      2:
        flow: source_dependencies

  # Prepares the Org with any required settings/testim scripts
  prepare_org:
    steps:
      1:
        task: install_qbrix_register
        ui_options:
          name: Install/Update QBrix Registration Tool
      2:
        task: deploy_settings
        ui_options:
          name: Deploying Org Settings
      3:
        task: update_dependencies

  #------------------------------------#
  # QBRIX DEPLOY                       #
  #------------------------------------#
  #DEFAULT INSTALL FLOWS ARE DEFINED HERE. "deploy_qbrix" and "deploy_qbrix_min" SHOULD ALWAYS BE DEFINED

  #DEFAULT INSTALL FOR QBRIX WHICH DEPLOYS EVERYTHING INCLUDING BASE Q BRANCH QBRIX
  deploy_qbrix:
    steps:
      1:
        flow: dependencies
      2:
        task: deploy
        ui_options:
          name: Deploying Q Brix Metadata
      3:
        flow: post_qbrix_deploy

  #DEFAULT INSTALL FOR QBRIX WHICH DEPLOYS EVERYTHING EXCEPT BASE Q BRANCH QBRIX
  deploy_qbrix_min:
    steps:
      1:
        task: deploy_settings
      2:
        task: update_dependencies
      3:
        flow: source_dependencies
      4:
        task: deploy
      5:
        flow: post_qbrix_deploy

  #RUN THIS FLOW FOR DEPLOYMENT TO A TSO PRODUCTION ORG
  deploy_qbrix_tso:
    steps:
      1:
        flow: deploy_qbrix

  #------------------------------------#
  # POST-QBRIX DEPLOY                  #
  #------------------------------------#
  #ADD POST DEPLOYMENT STEPS HERE

  post_qbrix_deploy:
    steps:
      1:
        task: None

  #APPEND ADDITIONAL STEPS TO CCI DEV AND QA FLOWS
  config_dev:
    steps:
      3:
        flow: post_qbrix_deploy

  config_qa:
    steps:
      3:
        flow: post_qbrix_deploy

  #------------------------------------#
  # QBRIX DATA                         #
  #------------------------------------#
  #DEFINE DATA GENERATION FLOWS HERE

  generate_qbrix_data:
    steps:
      1:
        task: None
        #flow: data:FLOWNAMEHERE

orgs:
  #------------------------------------#
  # SCRATCH ORG CONFIG                 #
  #------------------------------------#
  #DEFAULT SETTINGS FOR SCRATCH ORGS. PREVIEW ONLY WORKS IN CORE PREVIEW RELEASE WINDOWS

  scratch:
    dev:
      config_file: orgs/dev.json
      days: 30
      namespaced: false
    dev_preview:
      config_file: orgs/dev_preview.json
      days: 30
      namespaced: false
    qa:
      config_file: orgs/dev.json
      days: 30
      namespaced: false
    qa_preview:
      config_file: orgs/dev_preview.json
      days: 30
      namespaced: false

plans:
  #------------------------------------#
  # METADEPLOY CONFIG                  #
  #------------------------------------#
  #DEFINE DEPLOYMENY PLANS HERE FOR USE WITH METADEPLOY

  install_pack:
    slug: deployqbrix
    title: Install/Update Qbrix
    tier: primary
    is_listed: True
    steps:
      1:
        flow: deploy_qbrix_tso
