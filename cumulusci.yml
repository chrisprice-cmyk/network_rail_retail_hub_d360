project:

    #------------------------------------#
    # QBRIX CONFIG                       #
    #------------------------------------#
    #QBRIX NAME, API VERSION AND REPO DETAILS GO HERE

    name: NxDO-Template
    package:
        name: NxDO-Template
        api_version: '54.0'
    git:
        default_branch: 'main'
        repo_url: https://github.com/sfdc-qbranch/xDO-Template-v2
    source_format: sfdx
    dependencies:
      - github: https://github.com/sfdc-qbranch/QBrix-1-xDO-Tool-QBrixRegister
        unmanaged: True

  #------------------------------------#
  # QBRIX PACKAGE DEPEDENDENCIES       #
  #------------------------------------#
  #ADD MANAGED & UNMANAGED PACKAGE DEPEDENDENCIES HERE. OTHER CCI PROJECTS CAN ALSO BE LINKED PROVIDING THEY WORK WITH JUST A DEPLOY METHOD.

  #dependencies:
  #--Examples:
  #   - github: GitHubRepoURLHere (Note: This MUST be a CumulusCI Project and doesn't support custom installs, use sources if thats needed)
  #   - version_id: UnmanagedPackageIDHere
  #   - namespace: ManagedPackageNamespaceHere (Note: Lightning Components need to use the package ID and are treated as an unmanaged package)
  #     version: ManagedPackageVersionNumberHere
  #--Add Project Level Dependencies Below

#--Add Project Sources here--
sources:
    #------------------------------------#
    # QBRIX SOURCES                      #
    #------------------------------------#
    #ADD SOURCES HERE WHICH MUST BE CCI PROJECTS STORED IN GITHUB.

    base:
        github: https://github.com/sfdc-qbranch/QBrix-0-xDO-BaseConfig
        # release: latest

tasks:
  #------------------------------------#
  # CCI TASK DEFAULTS                  #
  #------------------------------------#
  #ADD DEFAULT CONFIGURATION FOR CCI TASK HERE

  robot:
    options:
      suites: robot/xDO-Template/tests
      options:
        outputdir: robot/xDO-Template/results

  robot_testdoc:
    options:
      path: robot/xDO-Template/tests
      output: robot/xDO-Template/doc/xDO-Template_tests.html

  run_tests:
    options:
      required_org_code_coverage_percent: 75

  load_dataset:
    options:
      ignore_row_errors: True
      drop_missing_schema: True
      set_recently_viewed: False

  generate_dataset_mapping:
    options:
      ignore: "LiveChatTranscript"

  deploy:
    options:
      path: force-app

  org_settings:
    options:
      definition_file: orgs/dev.json

  update_vscode_tasks:
    description: Update .vscode tasks.json file from Qbrix template 
    class_path: cumulusci.tasks.command.Command
    options:
      command: chmod +x scripts/QBrix/*.sh && scripts/Qbrix/UpdateVSCodeTasks.sh

  deploy_settings:
    description: Checks that Settings have been defined in force-app and deploys them if present
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
        path: force-app/main/default/settings

  #------------------------------------#
  # CHANGE CAPTURE                     #
  #------------------------------------#
  #ADD OBJECT EXCLUSIONS HERE WHICH YOU DON'T WANT TO PULL TO SOURCE BY DEFAULT

  list_changes:
    options:
      exclude:
        - FeatureParameter
        - "AuraDefinition:"
        - "SiteDotCom:"
        - "ManagedTopics:"
        - "LiveChatTranscript:"
        - "ExperienceResource:"
        - "AppMenu:"
        - "Profile:"
        - "FlowDefinition:"
        #Include to exclude Analytics Dashboards and Applications
        #- 'WaveApplication:'
        #- 'WaveDashboard:'
        #- 'WaveDataset:'
        #- 'WaveXmd:'
        #- 'WaveDataflow:'

  retrieve_changes:
    options:
      exclude:
        - FeatureParameter
        - "AuraDefinition:"
        - "SiteDotCom:"
        - "ManagedTopics:"
        - "LiveChatTranscript:"
        - "ExperienceResource:"
        - "AppMenu:"
        - "Profile:"
        - "FlowDefinition:"
        #Include to exclude Analytics Dashboards and Applications
        #- 'WaveApplication:'
        #- 'WaveDashboard:'
        #- 'WaveDataset:'
        #- 'WaveXmd:'
        #- 'WaveDataflow:'

flows:
  #------------------------------------#
  # CCI FLOW DEFAULTS                  #
  #------------------------------------#

  deploy_unmanaged_ee:
    steps:
      6:
        task: None

  deploy_unmanaged:
    steps:
      4:
        task: None

  #------------------------------------#
  # PRE-QBRIX DEPLOY                   #
  #------------------------------------#
  #APPEND ADDITIONAL SOURCE DEPENDENCY DEPLOYMENTS ONTO THE DEFAULT CCI DEPENDENCY FLOW

  source_dependencies:
    steps:
      1:
        task: None
        # flow: base:deploy_qbrix  

  dependencies:
    steps:
      1:  
        flow: prepare_org                        
      2:
        flow: source_dependencies

  # Prepares the Org with any required settings/testim scripts
  prepare_org:
    steps:
      1:
        task: org_settings
        when: not org_config.scratch
        ui_options:
          name: Deploying Settings
      2:
        task: deploy_settings
        ui_options:
          name: Deploying Settings
      3:
        task: update_dependencies
          

  #------------------------------------#
  # QBRIX DEPLOY                       #
  #------------------------------------#
  #DEFAULT INSTALL FLOWS ARE DEFINED HERE. "deploy_qbrix" and "deploy_qbrix_min" SHOULD ALWAYS BE DEFINED

  #DEFAULT INSTALL FOR QBRIX WHICH DEPLOYS EVERYTHING INCLUDING BASE QBRANCH QBRIX
  deploy_qbrix:
    steps:
      1:
        flow: dependencies
      2:
        task: deploy
        ui_options:
          name: Deploying Q Brix Metadata
      3:
        flow: post_qbrix_deploy

  #DEFAULT INSTALL FOR QBRIX WHICH DEPLOYS EVERYTHING EXCEPT BASE QBRANCH QBRIX
  deploy_qbrix_min:
    steps:
      1:
        task: update_dependencies
      2:
        flow: source_dependencies
      3:
        task: deploy
      4:
        flow: post_qbrix_deploy

  #RUN THIS FLOW FOR DEPLOYMENT TO A TSO PRODUCTION ORG
  deploy_qbrix_tso:
    steps:
      1:
        flow: deploy_qbrix

  #------------------------------------#
  # POST-QBRIX DEPLOY                  #
  #------------------------------------#
  #ADD POST DEPLOYMENT STEPS HERE

  post_qbrix_deploy:
    steps:
      1:
        task: None

  #APPEND ADDITIONAL STEPS TO CCI DEV AND QA FLOWS
  config_dev:
    steps:
      3:
        flow: post_qbrix_deploy

  config_qa:
    steps:
      3:
        flow: post_qbrix_deploy

  #------------------------------------#
  # QBRIX DATA                         #
  #------------------------------------#
  #DEFINE DATA GENERATION FLOWS HERE

  generate_qbrix_data:
    steps:
      1:
        task: None
        #flow: data:FLOWNAMEHERE

orgs:
  #------------------------------------#
  # SCRATCH ORG CONFIG                 #
  #------------------------------------#
  #DEFAULT SETTINGS FOR SCRATCH ORGS. PREVIEW ONLY WORKS IN CORE PREVIEW RELEASE WINDOWS

  scratch:
    dev:
      config_file: orgs/dev.json
      days: 30
      namespaced: false
    dev_preview:
      config_file: orgs/dev_preview.json
      days: 30
      namespaced: false

plans:
  #------------------------------------#
  # METADEPLOY CONFIG                  #
  #------------------------------------#
  #DEFINE DEPLOYMENY PLANS HERE FOR USE WITH METADEPLOY

  install_pack:
    slug: deployqbrix
    title: Install/Update Qbrix
    tier: primary
    is_listed: True
    steps:
      1:
        flow: deploy_qbrix_tso
