project:
  #------------------------------------#
  # DEMO BRIX CONFIG                   #
  #------------------------------------#
  # Demo Brix Name, Metadata API Version and Repo URL are all set here. Name and Package > Name must be the same.
  # Guidance: https://qlabs-org.my.site.com/qverse/s/learn?name=Template-Overview

  name: xDO-Template
  package:
    name: xDO-Template

    # Metadata API Version (Remember to update this when you update the API version in the sfdx-project.json file)
    api_version: "66.0"

  git:
    repo_url: https://github.com/sfdc-qbranch-emu/xDO-Template

  custom:
    #------------------------------------#
    # DEMO BRIX REGISTRATION             #
    #------------------------------------#
    # You must run the "UTILS: Setup New Brix Project" task from the VSCode Build Tasks (Cmd + Shift + b on MacOS) to set these as it will also update other files.
    # Note: This does not affect existing config and can be run multiple times and must be run before checking in changes to Github.
    qbrix_owner_name: OWNER NAME HERE
    qbrix_owner_email: OWNER EMAIL HERE
    qbrix_owner_team: OWNER TEAM HERE
    qbrix_publisher_name: OWNER OR PUBLISHER NAME HERE
    qbrix_publisher_team: OWNER OR PUBLISHER TEAM HERE
    qbrix_documentation_url: https://qlabs-org.my.site.com/qverse/s/
    qbrix_description: SHORT DESCRIPTION OF BRIX HERE

  #------------------------------------#
  # SALESFORCE PACKAGE DEPENDENCIES    #
  #------------------------------------#
  # Managed and Unmanaged Salesforce Packages can be defined here
  # Guidance: https://qlabs-org.my.site.com/qverse/s/learn?name=Template-Dependencies-and-Packages

  dependencies:

sources:
  #------------------------------------#
  # DEMO BRIX SOURCES                  #
  #------------------------------------#
  # Here is where dependant brix are defined for this brix
  # Guidance: https://qlabs-org.my.site.com/qverse/s/learn?name=Template-Dependencies-and-Packages

  # Brix Registration Base
  qbrix_register_base:
    github: https://github.com/sfdc-qbranch-emu/QBrix-1-xDO-Tool-QBrixRegister

tasks:
  #------------------------------------#
  # NextGen Data Tool                  #
  #------------------------------------#
  # NextGen Data Tool Integration - Add data keys below or within the flow step

  deploy_nextgen_data:
    class_path: qx.data.qx_nextgen_datatool.RunDataTool

  #------------------------------------#
  # CUSTOM TASK OVERRIDES & DEFAULTS   #
  #------------------------------------#
  # Add custom task definitions and overrides here.

flows:
  #------------------------------------#
  # STAGE 1 of 3: PRE DEPLOYMENT       #
  #------------------------------------#
  # Define steps to prepare the org and deploy other dependencies in this section. prepare_org and source_dependencies should always be defined

  prepare_org:
    steps:
      1:
        # Brix System Task - Leave in place
        task: orgconfig_hydrate
      2:
        # Pre-Deploy Settings in force-app/main/default (if any)
        task: deploy_settings
      3:
        # Deploy Packages from Dependencies section above
        task: update_dependencies

  source_dependencies:
    steps:
      1:
        # Brix System Task - Leave in place
        task: orgconfig_hydrate
      2:
        # Deploy the requirements for Brix Registration in target Salesforce org
        flow: qbrix_register_base:deploy_qbrix
        when: not org_config.is_qbrix_installed('QBrix-1-xDO-Tool-QBrixRegister')

  #------------------------------------#
  # STAGE 2 of 3: Demo BRIX DEPLOYMENT #
  #------------------------------------#
  # DEFAULT DEPLOY FLOW IS deploy_qbrix which runs here. If you need to override then define it here and add or override steps (Not recommended)
  # BY DEFAULT deploy_qbrix runs (With tracing enabled):
  # 1. prepare_org flow
  # 2. source_dependencies flow
  # 3. deploy task (force-app/main/default)
  # 4. post_qbrix_deploy flow

  #------------------------------------#
  # DEMO BRIX TEST VALIDATION          #
  #------------------------------------#
  # Add steps here to validate your org deployment through testing
  # Guide Here: https://confluence.internal.salesforce.com/display/QNEXTGENDEMOS/Validation+Methods

  validate_qbrix:
    steps:
      1:
        task: validate_qbrix

  #------------------------------------#
  # DEMO BRIX DATA                     #
  #------------------------------------#
  # Define steps to deploy data (if needed) here. Placeholder has been added for the NextGen Data Tool
  # Guide: https://confluence.internal.salesforce.com/display/QNEXTGENDEMOS/Data

  deploy_qbrix_data:
    steps:
      1:
        # Placeholder task, replace this with your custom steps
        task: deploy_nextgen_data
