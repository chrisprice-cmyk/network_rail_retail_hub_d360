      - name: Running ${{ matrix.description }} ${{ matrix.leaf_shake_action }}::${{ matrix.reference_brix }}
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 1440
          retry_on: error
          max_attempts: 2
          command: |
            cd ${{matrix.reference_brix}}
            cci ${{ matrix.leaf_shake_action_type }} run ${{ matrix.leaf_shake_action }}  --org ninja
