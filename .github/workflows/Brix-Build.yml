  metadeploy_publish:
    needs: [build_deployments, leaf_shake_deployments]
    if: |
      always() &&
      (github.ref_name == 'main' || github.ref_name == 'master') &&
      needs.build_deployments.result == 'success' &&
      (needs.leaf_shake_deployments.result == 'success' || needs.leaf_shake_deployments.result == 'skipped' || needs.leaf_shake_deployments.result == 'failed') &&
      ! contains(github.repository, '-7-') &&
      ! contains(github.repository, '-99-')
    runs-on: sfdc-qbranch-nextgen-ubuntu
    container:
      image: ${{vars.BUILD_BASE_CONTAINER}}
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.QBRIX_CONTAINER_PUBLISH_GITHUB_PAT}}
    steps:
      - uses: actions/checkout@v4

      - name: Update QX
        run: qx update

      - name: Set ownership
        run: |
          # this is to fix GIT not liking owner of the checkout dir
          chown -R $(id -u):$(id -g) $PWD
          echo '${{ secrets.QBRIX_DEVHUB_PRIVATE_KEY }}' > devhub.key

        # We will use a common app with a common key -
      - name: Create SFDX Session for QLABS Service Account
        run: sf org login jwt -o ${{ secrets.QBRIX_QLABS_SERVICE_ACCOUNT }} -d -f devhub.key -i ${{ secrets.QBRIX_DEVHUB_CONSUMER_KEY }}

      - name: Extract the accesstoken
        run: sf org display -o ${{ secrets.QBRIX_QLABS_SERVICE_ACCOUNT }} --json > qlab_tmp.json

      - name: extract the accesstoken for qlabs
        id: qlabs_accesstoken
        run: |
          echo "qlabs_accesstoken=$(jq '.result.accessToken' qlab_tmp.json -r)" >> "$GITHUB_OUTPUT"

      - name: Set ENV variables
        run: |
          echo "::set-env name=REPO_NAME::${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/}"

      - name: get the build matrices
        run: |
          curl --location 'https://qlabs-org.my.salesforce.com/services/apexrest/NGQBrixBuildMatrixService' \
          --header 'Content-Type: application/json' \
          --header 'Authorization: Bearer ${{ steps.qlabs_accesstoken.outputs.qlabs_accesstoken }}' \
          --data '{"brixname": "${{ env.REPO_NAME }}"}' -o auto_publish.json

      - name: parse build matrices
        id: qlab_config_settings
        run: |
          echo "AUTOPUBLISH=$(jq .auto_publish_brix_store auto_publish.json)" >> "$GITHUB_OUTPUT"
          echo "AUTOPUBLISH=$(jq .auto_publish_brix_store auto_publish.json)" >> "$GITHUB_ENV"

      #display cci version
      - name: cci version
        if: (env.AUTOPUBLISH == 'true' && ( github.ref_name == 'main' || github.ref_name == 'master'))
        run: cci version

      #CCI Service List
      - name: cci service list
        if: (env.AUTOPUBLISH == 'true' && ( github.ref_name == 'main' || github.ref_name == 'master'))
        run: cci service list

      - name: metadeploy publish - if applicable
        if: (env.AUTOPUBLISH == 'true' && ( github.ref_name == 'main' || github.ref_name == 'master'))
        continue-on-error: true
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 5
          retry_on: error
          max_attempts: 1
          command: SHORTSHA=$(git rev-parse --short HEAD ) && cci task run metadeploy_publish --commit $SHORTSHA --publish True
          on_retry_command: cci error info