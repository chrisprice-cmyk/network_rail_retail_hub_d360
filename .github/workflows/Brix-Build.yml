          --data '{
            "github_repository_id": "${{ github.repository_id }}",
            "brixname": "${{ github.repository }}",
            "leafshakebrixbuildname": "${{ matrix.reference_brix_leafshake_build }}",
            "leafshakebrixname": "${{matrix.reference_brix}}",
